<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가장 많이 추천된 아이템 순위 - 메이플 스카우터</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/index.html" class="brand-link">
        <div class="brand">메이플 스카우터</div>
      </a>

      <div class="header-right">
        <button class="header-chip" type="button">Korean</button>
        <button class="header-chip" type="button">kms</button>
        <button class="header-chip" type="button">로그인</button>
      </div>
    </div>
  </header>

  <nav class="menu-bar">
    <div class="menu-inner">
      <a href="/result.html">장비진단</a>
      <a href="/stats-hwan.html">환산별 아이템 통계</a>
      <a href="/ranking-items.html">가장 많이 추천된 아이템 순위</a>
      <a href="/ranking-slot.html">부위별 많이 추천된 순위</a>
      <a href="/compare.html">유저 장비 비교</a>
    </div>
  </nav>

  <main class="page-shell">
    <section class="page-hero-card">
      <h1>가장 많이 추천된 아이템 순위</h1>
      <p>추천 로그 기준으로 자주 추천된 아이템 순위를 확인합니다.</p>
    </section>

    <section class="panel panel-light">
      <div class="ranking-filter-bar">
        <select id="rankingPeriod">
          <option value="today">오늘</option>
          <option value="7d">최근 7일</option>
          <option value="all">전체</option>
        </select>

        <select id="rankingSort">
          <option value="count">추천 횟수순</option>
          <option value="avg_rank">평균 순위순</option>
          <option value="avg_delta_hwan">평균 상승량순</option>
        </select>

        <select id="rankingPageSize">
          <option value="20">20개</option>
          <option value="50" selected>50개</option>
          <option value="100">100개</option>
        </select>

        <input id="rankingQuery" type="text" placeholder="아이템명 검색" />
        <button id="rankingApplyButton" type="button">적용</button>
      </div>

      <div id="rankingItemsRoot" class="guide-text">
        데이터를 불러오는 중입니다.
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div>
        <div class="footer-title">메이플 스카우터</div>
        <div class="footer-text">닉네임 검색 기반 장비 분석 · 추천 통계 · 환산 통계 제공</div>
        <div class="footer-copy">Copyright 2026. Maple Scouter. All rights reserved.</div>
      </div>

      <div class="footer-right">
        <a href="#">Discord</a>
        <a href="#">Mail</a>
        <a href="#">Github</a>
      </div>
    </div>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
