<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부위별 추천 순위 - 메훈남</title>
  <link rel="stylesheet" href="/style.css?v=24" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/index.html" class="site-logo">메훈남</a>

      <div class="top-actions">
        <button type="button" class="mini-chip">Korean</button>
        <button type="button" class="mini-chip">kms</button>
        <button type="button" class="mini-chip">로그인</button>
      </div>
    </div>
  </header>

  <nav class="menu-bar desktop-only">
    <div class="container menu-bar-inner">
      <a href="/result.html">장비진단</a>
      <a href="/stats-hwan.html">환산별 아이템 통계</a>
      <a href="/ranking-items.html">추천 아이템 순위</a>
      <a href="/ranking-slot.html">부위별 추천 순위</a>
      <a href="/compare.html">유저 비교</a>
    </div>
  </nav>

  <main class="home-page">
    <div class="container">
      <section class="card" style="margin-bottom:16px;">
        <div class="card-header">
          <div>
            <h2>부위별 추천 순위</h2>
            <p>부위 기준으로 자주 추천된 아이템 순위를 확인합니다.</p>
          </div>
        </div>
      </section>

      <section class="card" style="margin-bottom:16px;">
        <div class="card-body" style="padding-top:18px;">
          <div style="display:grid;grid-template-columns:180px 180px 180px 1fr 120px 90px;gap:12px;">
            <select id="slotPeriodSelect">
              <option value="today">오늘</option>
              <option value="week">최근 7일</option>
              <option value="month">최근 30일</option>
            </select>
            <select id="slotTypeSelect">
              <option value="">전체 부위</option>
            </select>
            <select id="slotSortSelect">
              <option value="count">추천 횟수순</option>
              <option value="gain">상승량순</option>
            </select>
            <select id="slotSizeSelect">
              <option value="20">20개</option>
              <option value="50">50개</option>
            </select>
            <input id="slotKeywordInput" type="text" placeholder="아이템명 검색" />
            <button id="applySlotRankingFilter">적용</button>
          </div>
        </div>
      </section>

      <section class="card" style="margin-bottom:16px;">
        <div class="card-header">
          <div><h2>TOP 3</h2></div>
        </div>
        <div class="card-body">
          <div id="top3SlotsGrid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
            <div class="card"><div class="card-body" style="padding-top:16px;">불러오는 중...</div></div>
            <div class="card"><div class="card-body" style="padding-top:16px;">불러오는 중...</div></div>
            <div class="card"><div class="card-body" style="padding-top:16px;">불러오는 중...</div></div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div><h2>전체 순위</h2></div>
        </div>
        <div class="card-body">
          <div style="overflow-x:auto;">
            <table id="rankingSlotTable" style="width:100%;border-collapse:collapse;">
              <thead>
                <tr style="background:#f4f7fb;">
                  <th style="text-align:left;padding:12px;">순위</th>
                  <th style="text-align:left;padding:12px;">아이템명</th>
                  <th style="text-align:left;padding:12px;">부위</th>
                  <th style="text-align:left;padding:12px;">추천 횟수</th>
                  <th style="text-align:left;padding:12px;">평균 순위</th>
                  <th style="text-align:left;padding:12px;">평균 상승량</th>
                  <th style="text-align:left;padding:12px;">대표 스타포스</th>
                  <th style="text-align:left;padding:12px;">대표 잠재</th>
                  <th style="text-align:left;padding:12px;">대표 에디</th>
                </tr>
              </thead>
              <tbody id="rankingSlotTableBody">
                <tr><td colspan="9" style="padding:18px;">데이터를 불러오는 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-title">메훈남</div>
      <div class="footer-sub">닉네임 검색 기반 장비 분석 · 추천 통계 · 환산 통계 제공<br />Copyright 2026. MeHunNam. All rights reserved.</div>
    </div>
  </footer>

  <script src="/ranking-slot.js?v=23"></script>
</body>
</html>
