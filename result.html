<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메이플 스카우터 - 진단 결과</title>
  <link rel="stylesheet" href="./result.css?v=20260317-3" />
</head>
<body>
  <div class="result-page" data-role="result-root">
    <header class="result-header">
      <div class="result-header-top">
        <a class="brand-link" href="./index.html">메이플 스카우터</a>
        <nav class="result-nav">
          <a href="./ranking-items.html">가장 많이 추천된 아이템</a>
          <a href="./ranking-slot.html">부위별 많이 추천된 순위</a>
          <a href="./stats-hwan.html">환산별 아이템 통계</a>
          <a href="./compare.html">유저 장비 비교</a>
        </nav>
      </div>

      <div class="result-search-bar">
        <div class="search-left">
          <span class="search-badge">Korean</span>
          <span class="search-badge">kms</span>
        </div>

        <form id="search-form" class="search-form">
          <input
            id="search-name"
            name="nickname"
            type="text"
            placeholder="닉네임을 입력하세요"
            autocomplete="off"
          />
          <input
            id="search-hwan"
            name="hwan"
            type="number"
            placeholder="환산을 입력해주세요"
            autocomplete="off"
          />
          <button type="submit">검색</button>
        </form>
      </div>

      <div class="result-title-row">
        <div>
          <h1 class="result-title" data-role="character-name">-</h1>
          <p class="result-subtitle" data-role="character-hwan">환산 -</p>
        </div>
      </div>

      <div class="result-message" data-role="result-message"></div>
    </header>

    <main>
      <section class="result-grid-top">
        <div class="panel panel-dark">
          <h2 class="panel-title small">가성비 TOP3</h2>
          <p class="panel-desc">현재 입력 기준 추천 결과를 표시합니다.</p>
          <div class="top3-list" data-role="top3-list"></div>
        </div>

        <div class="right-stack">
          <div class="panel">
            <h2 class="panel-title small">구성 요약</h2>
            <p class="panel-desc">세트 / 스타포스 / 잠재 / 에디 분포</p>
            <div class="summary-wrap" data-role="composition-summary"></div>
          </div>

          <div class="panel">
            <h2 class="panel-title small">다음 단계 추천</h2>
            <p class="panel-desc">다음 목표 환산 도달에 가는 순서</p>
            <div data-role="next-step-plan"></div>
          </div>
        </div>
      </section>

      <section class="result-grid-bottom">
        <div class="panel">
          <h2 class="panel-title small">내 템의 수준</h2>
          <p class="panel-desc">현재 환산 기준 위치 / 요약</p>
          <div data-role="equipment-level-summary"></div>
        </div>

        <div class="panel">
          <h2 class="panel-title small">자동 템 평가 점수</h2>
          <p class="panel-desc">스타포스 / 잠재 / 에디 / 세트효과 종합</p>
          <div data-role="equipment-score"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="./result.js?v=20260317-3" defer></script>
</body>
</html>
