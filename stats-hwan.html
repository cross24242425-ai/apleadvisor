<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>환산별 아이템 통계 - 메이플 스카우터</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/index.html" class="brand-link">
        <div class="brand">메이플 스카우터</div>
      </a>

      <div class="header-right">
        <button class="header-chip" type="button">Korean</button>
        <button class="header-chip" type="button">kms</button>
        <button class="header-chip" type="button">로그인</button>
      </div>
    </div>
  </header>

  <nav class="menu-bar">
    <div class="menu-inner">
      <a href="/result.html">장비진단</a>
      <a href="/stats-hwan.html">환산별 아이템 통계</a>
      <a href="/ranking-items.html">가장 많이 추천된 아이템 순위</a>
      <a href="/ranking-slot.html">부위별 많이 추천된 순위</a>
      <a href="/compare.html">유저 장비 비교</a>
    </div>
  </nav>

  <main class="page-shell">
    <section class="page-hero-card">
      <h1>환산별 아이템 통계</h1>
      <p>환산 구간별로 많이 추천되고 자주 관찰되는 장비 경향을 확인합니다.</p>
    </section>

    <section class="panel panel-light">
      <div class="ranking-filter-bar">
        <input id="hwanStart" type="number" placeholder="시작 환산" value="90000" />
        <input id="hwanEnd" type="number" placeholder="끝 환산" value="94999" />

        <select id="hwanPeriod">
          <option value="today">오늘</option>
          <option value="7d">최근 7일</option>
          <option value="all">전체</option>
        </select>

        <select id="hwanSlot">
          <option value="">전체 부위</option>
          <option value="반지">반지</option>
          <option value="펜던트">펜던트</option>
          <option value="귀고리">귀고리</option>
          <option value="벨트">벨트</option>
          <option value="얼굴장식">얼굴장식</option>
          <option value="눈장식">눈장식</option>
          <option value="어깨장식">어깨장식</option>
          <option value="상의">상의</option>
          <option value="하의">하의</option>
          <option value="신발">신발</option>
          <option value="망토">망토</option>
          <option value="훈장">훈장</option>
          <option value="기계 심장">기계 심장</option>
        </select>

        <select id="hwanSort">
          <option value="count">추천 횟수순</option>
          <option value="avg_rank">평균 순위순</option>
          <option value="avg_delta_hwan">평균 상승량순</option>
        </select>

        <button id="hwanApplyButton" type="button">적용</button>
      </div>

      <div id="statsHwanRoot" class="guide-text">
        데이터를 불러오는 중입니다.
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div>
        <div class="footer-title">메이플 스카우터</div>
        <div class="footer-text">닉네임 검색 기반 장비 분석 · 추천 통계 · 환산 통계 제공</div>
        <div class="footer-copy">Copyright 2026. Maple Scouter. All rights reserved.</div>
      </div>

      <div class="footer-right">
        <a href="#">Discord</a>
        <a href="#">Mail</a>
        <a href="#">Github</a>
      </div>
    </div>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
